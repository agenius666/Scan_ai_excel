name: scan_ai_excel_app
description: Excel-driven document scanner + AI validation Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  excel: 3.0.0
  flutter_doc_scanner: ^0.0.18
  http: ^1.6.0
  path_provider: ^2.1.5
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
